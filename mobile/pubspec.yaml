name: katocast
description: "KatoCast — ứng dụng dự báo thời tiết cá nhân hóa, độ chính xác cao."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State management (Clean Architecture / UI Layer) ---
  flutter_riverpod: ^2.5.1

  # --- Network (Data Layer / remote datasource) ---
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # --- Định vị & quyền ---
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # --- Thông báo & background task ---
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.9.0+3
  timezone: ^0.9.4

  # --- Local DB (Data Layer / local datasource - cache + fixed route) ---
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Navigation ---
  go_router: ^14.2.7

  # --- Models & functional error handling ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1

  # --- Lưu trạng thái alert lần trước (chống spam) ---
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code generation ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
