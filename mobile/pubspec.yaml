name: katocast
description: "KatoCast — ứng dụng dự báo thời tiết cá nhân hóa, độ chính xác cao."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State management (Clean Architecture / UI Layer) ---
  flutter_riverpod: ^2.5.1

  # --- Network (Data Layer / remote datasource) ---
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # --- Định vị & quyền ---
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  # Reverse geocoding: toạ độ -> tên phường/quận/thành phố (hiển thị địa điểm).
  geocoding: ^3.0.0

  # --- Thông báo & background task ---
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.9.0+3
  # Alarm hệ thống chạy code Dart nền ĐÚNG mốc giờ (kể cả app đã tắt) → bản tin
  # hằng ngày tự fetch dữ liệu tươi ngay lúc bắn thay vì hiển thị text đã cũ.
  android_alarm_manager_plus: ^4.0.4
  timezone: ^0.9.4
  # Lấy tên múi giờ thiết bị để set tz.local (zonedSchedule bắn đúng giờ địa phương).
  flutter_timezone: ^3.0.1

  # --- Local DB (Data Layer / local datasource - cache + fixed route) ---
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Navigation ---
  go_router: ^14.2.7

  # --- Bản đồ (OpenStreetMap, miễn phí, không cần API key) ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- Parse RSS (tin tức thời tiết/cảnh báo) ---
  xml: ^6.5.0

  # --- Mở link tin tức ra trình duyệt ---
  url_launcher: ^6.3.0

  # --- Theme / cá nhân hóa giao diện ---
  # Material You: lấy bảng màu động theo hình nền hệ thống (Android 12+).
  dynamic_color: ^1.7.0

  # --- Models & functional error handling ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1

  # --- Lưu trạng thái alert lần trước (chống spam) ---
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code generation ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3

  # --- App icon & splash (sinh icon/splash từ logo) ---
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# Sinh launcher icon từ logo. Chạy: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  # Dùng bản full-bleed (lấp đầy khung, không lề trong suốt) làm icon chính.
  image_path: "assets/icon/app_icon_fullbleed.png"
  remove_alpha_ios: true
  min_sdk_android: 23
  # Adaptive icon: nền = chính hình full-bleed, foreground trong suốt
  # => không còn lớp nền màu xanh bao quanh, launcher tự bo góc.
  adaptive_icon_background: "assets/icon/app_icon_fullbleed.png"
  adaptive_icon_foreground: "assets/icon/app_icon_transparent.png"

# Sinh splash screen từ logo. Chạy: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#2E6FB7"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#2E6FB7"
    image: "assets/icon/app_icon.png"
